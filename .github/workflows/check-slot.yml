name: check-slot

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: check-slot
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Random jitter (0-9 min) for scheduled runs
        if: github.event_name == 'schedule'
        run: sleep $((RANDOM % 540))

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python -m playwright install --with-deps chromium

      - name: Run slot check
        env:
          TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          APPLICANT_NAME: ${{ secrets.APPLICANT_NAME }}
          APPLICANT_DOB: ${{ secrets.APPLICANT_DOB }}
          APPLICANT_PHONE: ${{ secrets.APPLICANT_PHONE }}
          APPLICANT_EMAIL: ${{ secrets.APPLICANT_EMAIL }}
          APPLICANT_PASSPORT: ${{ secrets.APPLICANT_PASSPORT }}
        run: python -m src.main

      - name: Commit updated state
        if: always()
        run: |
          git config user.email "slot-bot@users.noreply.github.com"
          git config user.name "slot-bot"
          if ! git diff --quiet -- state.json chat_ids.json; then
            git add state.json chat_ids.json
            git commit -m "update state [skip ci]"
            git push
          else
            echo "state.json and chat_ids.json unchanged"
          fi

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: debug-screenshots/
          if-no-files-found: ignore
          retention-days: 7
